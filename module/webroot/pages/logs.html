<div class="card logs" aria-labelledby="logs-heading">

		<h3 id="logs-heading">Logs</h3>

		<button
			id="clear-logs"
			class="clear-btn"
			type="button"
			aria-label="Clear logs"

			Clear

	<pre

	></pre>
</div>
