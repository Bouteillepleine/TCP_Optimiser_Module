<div class="card settings" aria-labelledby="settings-title">
	<div class="card-header">
		<h3 id="settings-title">Settings</h3>
	</div>

	<div class="collapsible-group">
		<button
			class="collapsible-header"
			type="button"
			aria-expanded="false"
			aria-controls="tcp-settings-content"
		>
			<span class="collapsible-title">TCP Settings</span>
			<span class="arrow" aria-hidden="true">▼</span>
		</button>

		<div
			id="tcp-settings-content"
			class="collapsible-content collapsed"
			role="region"
			aria-label="TCP Settings"
		>
			<div class="setting-group">
				<div class="setting-row">
					<label for="wifi-algo">TCP Congestion Algorithm (Wi-Fi)</label>

					<select id="wifi-algo" class="dropdown">
						<option value="">Loading Options...</option>
					</select>
				</div>
			</div>

			<div class="setting-group">
				<div class="setting-row">
					<label for="wifi-qdisc">Qdisc Profile (Wi-Fi)</label>

					<select id="wifi-qdisc" class="dropdown">
						<option value="">Loading Options...</option>
					</select>
				</div>
			</div>

			<div class="setting-group">
				<div class="setting-row">
					<label for="cellular-algo">TCP Congestion Algorithm (Cellular)</label>

					<select id="cellular-algo" class="dropdown">
						<option value="">Loading Options...</option>
					</select>
				</div>
			</div>

			<div class="setting-group">
				<div class="setting-row">
					<label for="cellular-qdisc">Qdisc Profile (Cellular)</label>

					<select id="cellular-qdisc" class="dropdown">
						<option value="">Loading Options...</option>
					</select>
				</div>
			</div>

			<div class="setting-group toggle-container">
				<label id="kill-connections-label" for="kill-connections">
					Kill Connections on Change
				</label>

				<label class="toggle" aria-labelledby="kill-connections-label">
					<input type="checkbox" id="kill-connections">
					<span class="slider" aria-hidden="true"></span>
				</label>
			</div>

			<div class="setting-group toggle-container">
				<label id="initcwnd-initrwnd-label" for="initcwnd-initrwnd">
					Set Max initcwnd & initrwnd
				</label>

				<label class="toggle" aria-labelledby="initcwnd-initrwnd-label">
					<input type="checkbox" id="initcwnd-initrwnd">
					<span class="slider" aria-hidden="true"></span>
				</label>
			</div>
		</div>
	</div>

	<div class="settings-actions">
		<button id="apply" class="apply-btn" type="button">
			Apply
		</button>

		<button id="force-apply" class="apply-btn secondary" type="button">
			Force Apply
		</button>
	</div>
</div>
